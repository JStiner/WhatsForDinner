<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - What's for Dinner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell" style="max-width:640px;margin:40px auto;">
    <section class="panel" style="padding:24px;">
      <p class="section-label">Account</p>
      <h1>Reset your password</h1>
      <p id="reset-message" class="settings-help">Enter a new password for your account.</p>
      <div class="auth-body" style="margin-top:16px;">
        <label>
          <span>New password</span>
          <input id="new-password" type="password" autocomplete="new-password" />
        </label>
        <label>
          <span>Confirm password</span>
          <input id="confirm-password" type="password" autocomplete="new-password" />
        </label>
        <div class="settings-actions">
          <button class="primary-btn" id="reset-submit-btn" type="button">Save new password</button>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient(
      'https://blhwtdzxazuokvpfbqbl.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJsaHd0ZHp4YXp1b2t2cGZicWJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTcyNjcsImV4cCI6MjA5MDQ5MzI2N30.x6aQFBQQOQVx4WL5Vo1sgzwTUPRD-3todAp3-015WeI'
    );

    const msg = document.getElementById('reset-message');
    document.getElementById('reset-submit-btn').addEventListener('click', async () => {
      const password = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      if (!password || password.length < 6) {
        msg.textContent = 'Use a password with at least 6 characters.';
        msg.classList.add('account-error');
        return;
      }
      if (password !== confirm) {
        msg.textContent = 'Passwords do not match.';
        msg.classList.add('account-error');
        return;
      }
      const { error } = await supabaseClient.auth.updateUser({ password });
      if (error) {
        msg.textContent = error.message || 'Password reset failed.';
        msg.classList.add('account-error');
        return;
      }
      msg.textContent = 'Password updated. You can return to the app and sign in.';
      msg.classList.remove('account-error');
    });
  </script>
</body>
</html>
